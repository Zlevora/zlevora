<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZLEVORA</title>

<style>
  :root{
    --bg:#f5efe8;
    --card: rgba(255,255,255,0.78);
    --text:#2b2b2b;
    --muted:#7b7168;
    --shadow: 0 18px 50px rgba(0,0,0,0.14);
    --radius:22px;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
    background: radial-gradient(1200px 900px at 50% 20%, #fff9f2 0%, var(--bg) 60%, #efe6dc 100%);
    color:var(--text);
  }

  /* ===== Fullscreen Welcome Overlay ===== */
  .welcome{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(1200px 900px at 50% 20%, #fff9f2 0%, var(--bg) 65%, #efe6dc 100%);
    transition: opacity 700ms ease, visibility 700ms ease;
  }
  .welcome.hide{ opacity:0; visibility:hidden; }

  .welcomeBox{
    width:min(920px, 92vw);
    padding:28px 18px 22px;
    text-align:center;
    transform: translateY(10px);
    opacity:0;
    animation: enter 800ms ease-out forwards;
  }
  @keyframes enter{ to{transform:translateY(0); opacity:1;} }

  .brand{
    letter-spacing:.28em;
    font-weight:700;
    font-size:14px;
    color:#6c5f55;
    margin-bottom:10px;
  }
  .big{
    font-size: clamp(28px, 4vw, 46px);
    font-weight:750;
    margin:0 0 10px;
  }
  .sub{
    margin:0 0 18px;
    color:var(--muted);
    font-size: clamp(14px, 1.8vw, 18px);
  }

  /* iPhone-ish loading bar */
  .loader{
    width:220px; height:10px;
    margin: 0 auto;
    border-radius:999px;
    overflow:hidden;
    background: rgba(0,0,0,0.07);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
  }
  .loader span{
    display:block; height:100%;
    width:0%;
    background: linear-gradient(90deg,#d7c3ae,#ffffff,#d7c3ae);
    border-radius:999px;
    animation: load 2.3s ease-in-out forwards;
  }
  @keyframes load{ 0%{width:0%} 65%{width:80%} 100%{width:100%} }

  /* Soft floating text (premium feel) */
  .float{
    display:inline-block;
    animation: float 2.4s ease-in-out infinite;
  }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* ===== Main Page ===== */
  .page{
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 16px 60px;
    opacity:0;
    transform: translateY(10px);
    transition: all 700ms ease;
  }
  .page.show{ opacity:1; transform: translateY(0); }

  .hero{
    background: var(--card);
    border-radius: 26px;
    box-shadow: var(--shadow);
    overflow:hidden;
    border: 1px solid rgba(255,255,255,0.55);
  }

  .topbar{
    padding:18px 18px 10px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:12px;
  }
  .logoTxt{
    letter-spacing:.22em;
    font-weight:800;
    font-size:18px;
  }
  .tagline{
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
  }

  .cta{
    padding:10px 14px;
    border-radius: 999px;
    border: 0;
    background: rgba(212, 191, 170, 0.55);
    color:#3a312a;
    font-weight:700;
    cursor:pointer;
  }

  /* This shows YOUR app design image */
  .mockup{
    width:100%;
    height:auto;
    display:block;
  }

  .footer{
    text-align:center;
    margin-top:14px;
    color:#9a8f86;
    font-size:12px;
  }
</style>
</head>

<body>

<!-- Welcome overlay -->
<section class="welcome" id="welcome">
  <div class="welcomeBox">
    <div class="brand">Z L E V O R A</div>
    <h1 class="big"><span class="float">Welcome to Zlevora Family</span></h1>
    <p class="sub">Unboxing a new future for your family ✨</p>
    <div class="loader"><span></span></div>
  </div>
</section>

<!-- Main page -->
<main class="page" id="page">
  <section class="hero">
    <div class="topbar">
      <div>
        <div class="logoTxt">ZLEVORA</div>
        <div class="tagline">Smart Family Ecosystem</div>
      </div>
      <button class="cta" onclick="alert('Next step: login + full screens')">Get Started</button>
    </div>

    <!-- IMPORTANT: اسم الصورة اللي رفعتيه -->
    <img class="mockup" src="zlevora-ui.jpg" alt="ZLEVORA App Design Preview"/>
  </section>

  <div class="footer">ZLEVORA • Web Preview (Version 1)</div>
</main>

<script>
  const welcome = document.getElementById('welcome');
  const page = document.getElementById('page');

  // مدة الترحيب قبل ما يطلع تصميمك
  const duration = 2400;

  setTimeout(() => {
    welcome.classList.add('hide');
    page.classList.add('show');
  }, duration);
</script>

</body>
</html>
