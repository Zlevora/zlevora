<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ZLEVORA</title>

<style>
  :root{
    --bg:#efe7df;
    --card:#ffffffcc;
    --stroke:#ffffffaa;
    --text:#3a2f2a;
    --muted:#8a7b72;
    --accent:#b9a094;
    --shadow:0 18px 60px rgba(0,0,0,.18);
    --radius:22px;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background: radial-gradient(1200px 700px at 50% 15%, #f7f2ed 0%, var(--bg) 55%, #e7ded6 100%);
    min-height:100vh;
    display:grid;
    place-items:center;
    color:var(--text);
  }

  /* ------- iPhone shell ------- */
  .phone{
    width:min(420px, 92vw);
    aspect-ratio: 9/19.5;
    border-radius: 44px;
    background: linear-gradient(180deg,#f7f2ed,#f1e9e1);
    box-shadow: var(--shadow);
    border: 1px solid #ffffff90;
    position:relative;
    overflow:hidden;
  }

  .notch{
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:40%; height:28px; border-radius: 18px;
    background:#00000012;
  }

  .screen{
    position:absolute; inset:0;
    padding:54px 18px 18px 18px;
    display:flex; flex-direction:column;
    gap:14px;
  }

  /* ------- Welcome overlay ------- */
  .welcome{
    position:absolute; inset:0;
    display:grid;
    place-items:center;
    background: radial-gradient(700px 500px at 50% 35%, #ffffffcc 0%, #efe7df 55%, #e9ded6 100%);
    z-index:5;
    animation: welcomeFade 1.2s ease 2.3s forwards;
  }

  @keyframes welcomeFade{
    to{ opacity:0; pointer-events:none; }
  }

  .welcome .logo{
    display:grid;
    place-items:center;
    gap:14px;
    text-align:center;
    transform: translateY(10px);
    animation: floatIn 1.2s cubic-bezier(.2,1,.2,1) .25s both;
  }

  @keyframes floatIn{
    from{opacity:0; transform: translateY(28px) scale(.98)}
    to{opacity:1; transform: translateY(0) scale(1)}
  }

  .mark{
    width:86px; height:86px;
    border-radius: 26px;
    background: linear-gradient(145deg,#ffffff, #f1e7df);
    border:1px solid #ffffffb0;
    box-shadow: 0 18px 40px rgba(0,0,0,.10);
    display:grid;
    place-items:center;
    font-weight:700;
    letter-spacing:.5px;
    color:var(--accent);
    font-size:26px;
  }

  .welcome h1{
    margin:0;
    font-size:20px;
    font-weight:700;
    letter-spacing:.2px;
  }

  .welcome p{
    margin:0;
    font-size:13px;
    color:var(--muted);
  }

  .shine{
    position:absolute;
    width:140%;
    height:60%;
    left:-20%;
    top:-10%;
    background: linear-gradient(110deg, transparent 0%, #ffffff55 45%, transparent 70%);
    transform: translateX(-60%);
    animation: shine 1.8s ease .6s both;
    filter: blur(2px);
  }

  @keyframes shine{
    to{ transform: translateX(60%); }
  }

  /* ------- Header ------- */
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px 6px;
  }

  .brand{
    display:flex; align-items:center; gap:10px;
  }

  .brand .mini{
    width:34px; height:34px;
    border-radius:12px;
    background: linear-gradient(145deg,#fff,#f2e7df);
    border:1px solid #fff;
    display:grid; place-items:center;
    color:var(--accent);
    font-weight:800;
  }

  .brand .name{
    display:flex; flex-direction:column; line-height:1.05;
  }
  .brand .name b{font-size:14px}
  .brand .name span{font-size:11px; color:var(--muted)}

  .pill{
    padding:8px 12px;
    border-radius: 999px;
    background: #ffffffaa;
    border: 1px solid var(--stroke);
    font-size:12px;
    color:var(--muted);
  }

  /* ------- Cards ------- */
  .grid{
    display:grid;
    gap:12px;
    flex:1;
    overflow:auto;
    padding-bottom:10px;
  }

  .card{
    background: var(--card);
    border:1px solid var(--stroke);
    border-radius: var(--radius);
    padding:14px 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,.06);
    backdrop-filter: blur(8px);
  }

  .card h3{
    margin:0 0 6px 0;
    font-size:14px;
  }

  .card p{
    margin:0;
    font-size:12px;
    color:var(--muted);
    line-height:1.35;
  }

  .btn{
    margin-top:10px;
    width:100%;
    border:none;
    background: linear-gradient(180deg,#c7afa4,#b69d91);
    color:#fff;
    border-radius: 16px;
    padding:12px;
    font-weight:700;
    cursor:pointer;
  }

  /* ------- Bottom Nav ------- */
  .nav{
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:8px;
    padding:10px;
    background:#ffffffb5;
    border:1px solid var(--stroke);
    border-radius: 22px;
  }

  .tab{
    border:none;
    background:transparent;
    padding:10px 8px;
    border-radius: 16px;
    font-size:11px;
    color:var(--muted);
    cursor:pointer;
  }
  .tab.active{
    background:#f2e7df;
    color:var(--text);
    border:1px solid #ffffff;
  }

</style>
</head>

<body>
  <div class="phone">
    <div class="notch"></div>

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="shine"></div>
      <div class="logo">
        <div class="mark">Z</div>
        <h1>Welcome to ZLEVORA Family</h1>
        <p>Smart Family Ecosystem</p>
      </div>
    </div>

    <!-- App -->
    <div class="screen">
      <div class="top">
        <div class="brand">
          <div class="mini">Z</div>
          <div class="name">
            <b>ZLEVORA</b>
            <span>Smart Family Ecosystem</span>
          </div>
        </div>
        <div class="pill" id="pageTitle">Home</div>
      </div>

      <div class="grid" id="content"></div>

      <div class="nav">
        <button class="tab active" data-page="mother">Mother</button>
        <button class="tab" data-page="baby">Baby</button>
        <button class="tab" data-page="ai">AI</button>
        <button class="tab" data-page="shop">Shop</button>
        <button class="tab" data-page="community">Community</button>
      </div>
    </div>
  </div>

<script>
const pages = {
  mother: {
    title:"Mother",
    cards:[
      {t:"Pregnancy", d:"Track pregnancy journey, symptoms, appointments, and twins setup."},
      {t:"Postpartum", d:"Recovery checklist, mood tracking, and support routines."},
      {t:"Breastfeeding", d:"Pumping schedule, latch tips, milk log, and reminders."},
      {t:"Mental Health", d:"Stress relief, sleep support, quick breathing exercises."},
    ],
    button:"Get Started"
  },

  baby: {
    title:"Baby",
    cards:[
      {t:"Growth", d:"Weight/height/head growth tracking + weekly insights."},
      {t:"Vaccinations", d:"Vaccine timeline + reminders for each baby."},
      {t:"Sleep", d:"Sleep sessions, naps, wake windows, smart tips."},
      {t:"Feeding", d:"Milk/formula log, feeding timer, diaper notes."},
      {t:"Twins Mode", d:"Manage two babies separately with one dashboard."},
    ],
    button:"Track Now"
  },

  ai: {
    title:"AI Assistant",
    cards:[
      {t:"Quick Advice", d:"Ask anything about baby crying, feeding, sleep, or recovery."},
      {t:"Emergency Guide", d:"Choking, CPR, fever steps (fast navigation)."},
      {t:"Smart Suggestions", d:"Personalized routines based on your logs."},
    ],
    button:"Ask AI"
  },

  shop: {
    title:"Smart Shop",
    cards:[
      {t:"Smart Bottle Maker", d:"Auto warm + safe mix. Future ZLEVORA ecosystem compatible."},
      {t:"Wearable Pump", d:"Silent wearable pump integration (future devices ready)."},
      {t:"Milk Storage Pods", d:"Label, track, and organize milk storage."},
    ],
    button:"Browse"
  },

  community: {
    title:"Community",
    cards:[
      {t:"Moms & Dads", d:"Support groups, tips, and real stories."},
      {t:"Twins Corner", d:"Twin parents community & checklists."},
      {t:"Expert Q&A", d:"Ask professionals (future feature placeholder)."},
    ],
    button:"Join"
  }
};

function render(pageKey){
  const page = pages[pageKey];
  document.getElementById("pageTitle").textContent = page.title;
  const box = document.getElementById("content");
  box.innerHTML = "";

  page.cards.forEach(c=>{
    const el = document.createElement("div");
    el.className="card";
    el.innerHTML = <h3>${c.t}</h3><p>${c.d}</p>;
    box.appendChild(el);
  });

  const btn = document.createElement("button");
  btn.className="btn";
  btn.textContent = page.button;
  box.appendChild(btn);
}

document.querySelectorAll(".tab").forEach(b=>{
  b.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    render(b.dataset.page);
  });
});

render("mother");
</script>

</body>
</html>
